        highlights:
          - "Developed SRN-C, an astrocyte-inspired self-repair mechanism for EP-trained networks under permanent synaptic faults; validated on MNIST and CIFAR-10 without fault localization."
          - "Investigating augmented EP learning dynamics grounded in astrocytic modulation; proved gradient-equivalence with backpropagation and characterized the resulting implicit regularization structure."
          - "Built and maintained GPU training pipelines in PyTorch/CUDA: 3-phase symmetric EP, fault injection protocols, and systematic accuracy/efficiency analyses."

